name: 每日掃描有擔保可轉換公司債公告

on:
  schedule:
    - cron: '30 13 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4
      - run: python scraper_secured.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data_secured.json
          git diff --cached --quiet || git commit -m "chore: update data_secured.json [$(date +'%Y-%m-%d')]"
          git push
